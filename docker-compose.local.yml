services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: choremax
      POSTGRES_PASSWORD: localpassword
      POSTGRES_DB: choremax
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U choremax -d choremax"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://choremax:localpassword@db:5432/choremax
      JWT_SECRET: local-dev-secret-not-for-production-use-change-me-please
      JWT_EXPIRY_DAYS: 7
      NODE_ENV: development
      FRONTEND_ORIGIN: http://localhost:3000,http://localhost:80
    depends_on:
      db:
        condition: service_healthy

  nginx:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx-local.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

volumes:
  postgres_data:
