services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-choremax}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME:-choremax}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME:-choremax}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_DAYS: ${JWT_EXPIRY_DAYS:-7}
      NODE_ENV: ${NODE_ENV:-production}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-https://choremax.bltbox.com}
    volumes:
      - uploads_data:/uploads
    depends_on:
      db:
        condition: service_healthy

  nginx:
    build: ./frontend
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./nginx/nginx-internal.conf:/etc/nginx/nginx.conf:ro
      - uploads_data:/uploads:ro
    networks:
      - default
      - npm_network
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:

networks:
  npm_network:
    external: true
    name: ${NPM_NETWORK:-npm_default}
